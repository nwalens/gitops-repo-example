name: Build Image & Deploy
run-name: ${{ github.ref_name }} build 🚀
on:
  push:
    tags:
      - "v*"
env:
  appName: fintool
  imageRegistry: quay.io/fintool
jobs:
  Build-Deploy-Image:
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted locally!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v5
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to build your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - name: Build Image & Deploy
        run: |
          podman build --cgroup-manager=cgroupfs -t ${{ env.appName }}:${{ github.ref_name }} .
          [[ ! $(podman stop --cgroup-manager=cgroupfs ${{ env.appName }}) ]] || echo "Container was not running!"
          echo "Starting Container"
          podman run --replace -ti --cgroup-manager=cgroupfs -d --name ${{ env.appName }} ${{ env.appName }}:${{ github.ref_name }}
      - run: echo "🍏 This job's status is ${{ job.status }}."